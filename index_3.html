    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #344f39; }

    .screen {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      overflow-y: scroll; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
      display: flex; justify-content: center; align-items: flex-start;
    }
    .screen.active { opacity: 1; pointer-events: auto; }

    /* ── SCREEN 1: GUEST CHECK ── */
    #screen-form { background: #d0f3ff; }
    .gc-wrap { width: 100%; max-width: 390px; min-height: 100%; display: flex; flex-direction: column; background: #fff; }
    .gc-header { background: rgba(217,217,217,0.55); min-height: 189px; display: flex; align-items: center; justify-content: center; padding: 16px 20px; flex-shrink: 0; }
    .gc-title { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: clamp(60px,21vw,86px); color: #4598b3; line-height: 0.92; text-align: center; -webkit-font-smoothing: antialiased; }
    .gc-bar { background: #2a392c; height: 10px; flex-shrink: 0; }
    .gc-body { background: #d0f3ff; flex: 1; display: flex; flex-direction: column; }
    .gc-inputs { padding: 14px 19px 0; }
    .gc-field { background: rgba(191,229,240,0.25); box-shadow: inset 0 4px 4px rgba(0,0,0,0.22); height: 44px; margin-bottom: 12px; display: flex; align-items: center; padding: 0 12px; }
    .gc-field input { width: 100%; border: none; background: transparent; font-family: 'Damion', cursive; font-size: 22px; color: #225b6e; outline: none; -webkit-appearance: none; -webkit-text-size-adjust: 100%; }
    .gc-field input::placeholder { color: #225b6e; opacity: 0.85; }
    .gc-prompt { font-family: 'Oswald', sans-serif; font-weight: 400; font-size: 13px; letter-spacing: 0.04em; color: #225b6e; text-transform: uppercase; text-align: center; padding: 10px 12px 0; }
    .gc-divider { height: 1.5px; background: rgba(34,91,110,0.3); margin-top: 8px; }
    .gc-lined { flex: 1; position: relative; min-height: 200px; max-height: 52vh; overflow: hidden; background-image: repeating-linear-gradient(to bottom, transparent 0px, transparent 29px, rgba(100,185,210,0.5) 29px, rgba(100,185,210,0.5) 30px); }
    .gc-lined::before { content: ''; position: absolute; top: 0; bottom: 0; left: 29px; width: 1.5px; background: #b34547; opacity: 0.75; z-index: 1; }
    .gc-lined::after  { content: ''; position: absolute; top: 0; bottom: 0; right: 29px; width: 1.5px; background: #b34547; opacity: 0.75; z-index: 1; }
    .gc-comment-label { font-family: 'Damion', cursive; font-size: 26px; color: #225b6e; padding: 10px 14px 6px 44px; position: relative; z-index: 2; }
    .gc-textarea-wrap { margin: 2px 34px 0; background: rgba(191,229,240,0.2); box-shadow: inset 0 4px 4px rgba(0,0,0,0.18); position: relative; z-index: 2; }
    .gc-textarea { width: 100%; min-height: 240px; border: none; background: transparent; font-family: 'Damion', cursive; font-size: 18px; color: #225b6e; padding: 8px 14px; outline: none; resize: none; line-height: 30px; display: block; -webkit-appearance: none; -webkit-text-size-adjust: 100%; }
    .gc-textarea::placeholder { color: rgba(34,91,110,0.38); }
    .gc-send-zone { background: #d0f3ff; background-image: repeating-linear-gradient(to bottom, transparent 0px, transparent 29px, rgba(100,185,210,0.5) 29px, rgba(100,185,210,0.5) 30px); padding: 32px 0; display: flex; justify-content: center; align-items: center; position: relative; z-index: 10; flex-shrink: 0; }
    .gc-double-rule { position: absolute; top: 0; left: 0; right: 0; }
    .gc-double-rule span { display: block; height: 1.5px; background: rgba(34,91,110,0.38); margin-bottom: 10px; }
    .gc-send-btn { width: 128px; height: 128px; border-radius: 50%; background: #f5d76e; border: none; cursor: pointer; font-family: 'Damion', cursive; font-size: 40px; color: #b34547; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.25); position: relative; z-index: 20; touch-action: manipulation; -webkit-tap-highlight-color: rgba(0,0,0,0.08); user-select: none; -webkit-user-select: none; padding-bottom: 4px; }
    .gc-send-btn:active { transform: scale(.91); }
    .gc-footer { background: #2a392c; height: 68px; box-shadow: inset 0 4px 4px rgba(0,0,0,0.25); flex-shrink: 0; }
    .err { font-family: sans-serif; font-size: 11px; color: #b34547; padding: 0 0 4px 6px; display: none; }
    .err.show { display: block; }

    /* ── SCREEN 2: THANK YOU ── */
    #screen-thanks { background: #344f39; }
    .ty-frame {
      width: 100%; max-width: 390px;
      min-height: 100vh; min-height: 100dvh;
      position: relative;
      background-color: #344f39;
      background-image: repeating-linear-gradient(to right, #2b4530 0px, #2b4530 22px, #344f39 22px, #344f39 50px);
      background-position: 39px 0;
    }
    /* Images already have transparent bg — no blend mode needed */
    .ty-logo {
      position: absolute;
      left: 11.03%; top: 25.70%; width: 77.95%;
      display: block; z-index: 2;
    }
    .ty-sub {
      position: absolute; top: 41.03%;
      left: 0; right: 0;
      font-family: 'Damion', cursive;
      font-size: clamp(17px, 6vw, 25px);
      color: #99e0f7; line-height: 1.5;
      text-align: center; z-index: 2; padding: 0 24px;
      -webkit-text-size-adjust: 100%;
    }
    .ty-candy {
      position: absolute;
      left: 17.95%; top: 52.38%; width: 64.10%;
      display: block; z-index: 2; cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform .22s cubic-bezier(.34,1.56,.64,1);
      text-decoration: none;
    }
    .ty-candy img { width: 100%; display: block; }
    .ty-candy:active { transform: scale(.93); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #screen-thanks.active .ty-frame { animation: fadeUp .5s ease both; }
  </style>
</head>
<body>

  <!-- SCREEN 1: GUEST CHECK -->
  <div id="screen-form" class="screen active">
    <div class="gc-wrap">
      <div class="gc-header">
        <div class="gc-title">Guest<br>Check</div>
      </div>
      <div class="gc-bar"></div>
      <div class="gc-body">
        <div class="gc-inputs">
          <div class="gc-field">
            <input id="inp-name" type="text" placeholder="Name" autocomplete="name" autocorrect="off"/>
          </div>
          <div class="err" id="err-name">Please enter your name.</div>
          <div class="gc-field">
            <input id="inp-email" type="email" placeholder="E-mail" autocomplete="email" autocorrect="off" autocapitalize="none"/>
          </div>
          <div class="err" id="err-email">Please enter a valid email.</div>
        </div>
        <div class="gc-prompt">LET CHEF(ME)KNOW WHAT DO YOU FEEL ABOUT</div>
        <div class="gc-divider"></div>
        <div class="gc-lined">
          <div class="gc-comment-label">Comment</div>
          <div class="gc-textarea-wrap">
            <textarea class="gc-textarea" id="inp-comment" placeholder="Write here..." rows="8"></textarea>
          </div>
          <div class="err" id="err-comment" style="padding-left:44px;position:relative;z-index:2;">Please write a short comment.</div>
        </div>
        <div class="gc-send-zone">
          <div class="gc-double-rule"><span></span><span></span></div>
          <button class="gc-send-btn" id="btn-send">Send</button>
        </div>
      </div>
      <div class="gc-footer"></div>
    </div>
  </div>

  <!-- SCREEN 2: THANK YOU -->

  </div>

  <script>
    const FORM_ACTION   = 'https://docs.google.com/forms/d/e/1FAIpQLSfQo6DVZBiFzMDjmgdLiMUMQy--9vp5RfKaKc9idYfWuqp7Dg/formResponse';
    const ENTRY_NAME    = 'entry.318200041';
    const ENTRY_EMAIL   = 'entry.331253226';
    const ENTRY_COMMENT = 'entry.1241935697';
    const inpName    = document.getElementById('inp-name');
    const inpEmail   = document.getElementById('inp-email');
    const inpComment = document.getElementById('inp-comment');

    function setErr(id, show) { document.getElementById(id).classList.toggle('show', show); }
    function validate() {
      const nameOk  = inpName.value.trim().length > 0;
      const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(inpEmail.value.trim());
      const cmtOk   = inpComment.value.trim().length > 0;
      setErr('err-name', !nameOk); setErr('err-email', !emailOk); setErr('err-comment', !cmtOk);
      return nameOk && emailOk && cmtOk;
    }

    let sent = false; // guard: prevent double-fire from touchend + click on iOS

    function doSend(e) {
      e.preventDefault();
      e.stopPropagation();
      if (sent) return;       // already handled by touchend, ignore the click
      if (!validate()) return;
      sent = true;            // lock so click event that follows touchend is ignored

      // Submit silently to Google Form via hidden iframe
      let frame = document.getElementById('_hf');
      if (!frame) {
        frame = document.createElement('iframe');
        frame.id='_hf'; frame.name='_hf';
        frame.style.display='none';
        document.body.appendChild(frame);
      }
      const form = document.createElement('form');
      form.method='POST'; form.action=FORM_ACTION;
      form.target='_hf'; form.style.display='none';
      [[ENTRY_NAME, inpName.value.trim()],
       [ENTRY_EMAIL, inpEmail.value.trim()],
       [ENTRY_COMMENT, inpComment.value.trim()]
      ].forEach(([k,v]) => {
        const i = document.createElement('input');
        i.type='hidden'; i.name=k; i.value=v;
        form.appendChild(i);
      });
      document.body.appendChild(form);
      form.submit();
      setTimeout(() => form.remove(), 1500);

      // Switch to Thank You screen
      const s1 = document.getElementById('screen-form');
      const s2 = document.getElementById('screen-thanks');
      s1.scrollTop = 0;
      s1.classList.remove('active');
      s2.scrollTop = 0;
      s2.classList.add('active');
    }

    const btn = document.getElementById('btn-send');
    // Use touchstart to visually respond immediately on iOS,
    // then touchend to actually submit (standard iOS pattern)
    btn.addEventListener('touchstart', function(e) {
      e.currentTarget.style.transform = 'scale(0.91)';
    }, {passive: true});

    btn.addEventListener('touchend', function(e) {
      e.currentTarget.style.transform = '';
      doSend(e);
    }, {passive: false});

    // Fallback for desktop / non-touch
    btn.addEventListener('click', function(e) {
      if (sent) return; // already handled by touchend on mobile
      doSend(e);
    });
  </script>
